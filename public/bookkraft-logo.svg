<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#0F0E0C"/>

  <!-- Open book shape -->
  <g transform="translate(100,100)">
    <!-- Left page -->
    <path d="M-8,-28 C-20,-26 -38,-22 -52,-14 L-52,30 C-38,22 -20,26 -8,28 Z"
          fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Right page -->
    <path d="M8,-28 C20,-26 38,-22 52,-14 L52,30 C38,22 20,26 8,28 Z"
          fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Spine -->
    <line x1="0" y1="-28" x2="0" y2="28" stroke="#C9A84C" stroke-width="2.5"/>
    <!-- Left page lines -->
    <line x1="-12" y1="-14" x2="-40" y2="-8" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
    <line x1="-12" y1="-4" x2="-40" y2="2" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
    <line x1="-12" y1="6" x2="-40" y2="12" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
    <!-- Right page lines -->
    <line x1="12" y1="-14" x2="40" y2="-8" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
    <line x1="12" y1="-4" x2="40" y2="2" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
    <line x1="12" y1="6" x2="40" y2="12" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
    <!-- AI spark top right -->
    <g transform="translate(38,-32)">
      <line x1="0" y1="-7" x2="0" y2="7" stroke="#C9A84C" stroke-width="1.5"/>
      <line x1="-7" y1="0" x2="7" y2="0" stroke="#C9A84C" stroke-width="1.5"/>
      <line x1="-5" y1="-5" x2="5" y2="5" stroke="#C9A84C" stroke-width="1" opacity="0.7"/>
      <line x1="5" y1="-5" x2="-5" y2="5" stroke="#C9A84C" stroke-width="1" opacity="0.7"/>
    </g>
  </g>
</svg>
